
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refurb Watcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body class="pb-10">

    <header class="header-glass">
        <div class="max-w-md mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-semibold tracking-tight">Refurb Watcher</h1>
            <div id="connection-status" class="status-indicator"></div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6">
        <div class="filter-bar flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button class="filter-chip active">Tous</button>
            <button class="filter-chip text-gray-500">MacBook Air</button>
            <!-- <button class="filter-chip text-gray-500">iPad</button> -->
        </div>

        <div id="product-list" class="space-y-4">
            <div class="skeleton-card"></div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
